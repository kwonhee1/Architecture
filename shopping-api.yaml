openapi: 3.0.3
info:
  title: Shopping Mall API
  version: 1.0.0
  description: |
    기능 명세서 기반 쇼핑몰 API 스펙.

    ## 인증
    - 로그인(`POST /users/login`) 성공 시 `UserId=%d` 형태의 쿠키가 발급됩니다.
    - 인증이 필요한 API는 이 `UserId` 쿠키로 사용자를 식별하고 권한을 확인합니다.

    ## 공통 규칙
    - password는 인코딩하지 않고 저장/비교합니다(명세 요구사항).
    - password는 어떤 응답에서도 반환하지 않습니다.

servers:
  - url: http://localhost:8080
    description: local

tags:
  - name: user
    description: 회원
  - name: coupon
    description: 쿠폰
  - name: product
    description: 상품 / 옵션
  - name: order
    description: 주문

security:
  - UserIdCookie: []

paths:
  # ────────────────────────────── USER ──────────────────────────────
  /users:
    post:
      tags: [user]
      summary: user-01 회원 가입
      description: |
        신규 회원을 email/password로 가입합니다.
        - email 중복 확인 필요
        - password는 인코딩하지 않음
        - 가입 완료 후 첫 쿠폰 `{ "회원 가입 쿠폰", 1000 }`을 자동 발급 (coupon-01, 내부 처리 / 별도 API 없음)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: 회원 가입 완료 (본문 없음)
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 이미 존재하는 email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/login:
    post:
      tags: [user]
      summary: user-02 로그인
      description: |
        email/password 로그인. 성공 시 `UserId=%d` 쿠키를 발급합니다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공 (본문 없음)
          headers:
            Set-Cookie:
              description: 로그인 유지용 쿠키
              schema:
                type: string
                example: UserId=1; Path=/; HttpOnly
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: email 또는 password 불일치
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/me:
    get:
      tags: [user]
      summary: user-03 회원 정보 조회
      description: 로그인한 사용자의 정보를 조회합니다. password는 반환하지 않습니다.
      responses:
        '200':
          description: 회원 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/points:
    post:
      tags: [user]
      summary: user-04 포인트 충전
      description: 회원 포인트를 충전합니다(실제 결제 로직은 생략). 충전 포인트 > 0.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChargePointRequest'
      responses:
        '200':
          description: 충전 후 회원 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ────────────────────────────── COUPON ─────────────────────────────
  /coupons:
    get:
      tags: [coupon]
      summary: coupon-02 쿠폰 리스트 조회
      description: 로그인한 사용자의 사용 가능한 쿠폰만 조회합니다.
      responses:
        '200':
          description: 사용 가능한 쿠폰 리스트
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Coupon'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ────────────────────────────── PRODUCT ────────────────────────────
  /products:
    post:
      tags: [product]
      summary: product-01 새 상품 등록
      description: |
        로그인한 사용자가 새 상품을 등록합니다.
        - 판매 금액 > 0
        - 기본 옵션 `{ 설명: "기본 옵션", 금액: 0, 재고: 0 }`을 함께 생성합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: 등록된 상품 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      tags: [product]
      summary: product-03 상품 리스트 조회
      description: 판매중인 모든 상품 리스트를 조회합니다. 정렬 없음, 옵션 정보는 반환하지 않습니다.
      security: []
      responses:
        '200':
          description: 상품 리스트
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

  /products/me:
    get:
      tags: [product]
      summary: product-05 내가 생성한 상품 리스트 조회
      description: 로그인한 사용자가 생성한 상품들만 조회합니다. 정렬 없음.
      responses:
        '200':
          description: 내가 생성한 상품 리스트
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MyProduct'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /products/{productId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [product]
      summary: product-04 상품 상세 조회
      description: 특정 상품의 상세 정보와 옵션 리스트를 조회합니다. 옵션 정렬 없음.
      security: []
      responses:
        '200':
          description: 상품 상세 (옵션 포함)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [product]
      summary: product-02 상품 정보 수정
      description: |
        상품 생성자만 수정 가능합니다.
        - 수정하고 싶은 값만 전달(null 허용)
        - 이미 order가 있다면 금액은 수정할 수 없습니다.
        - 판매 금액 > 0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
      responses:
        '200':
          description: 수정된 상품 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 생성자가 아니거나, order 존재로 금액 수정 불가
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'

  # ────────────────────────────── OPTION ─────────────────────────────
  /products/{productId}/options:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    post:
      tags: [product]
      summary: option-01 옵션 생성
      description: |
        상품 생성자만 생성 가능합니다.
        - 추가 금액 + 상품 금액 > 0
        - 재고 개수 >= 0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptionCreateRequest'
      responses:
        '201':
          description: 생성된 옵션 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Option'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /products/{productId}/options/{optionId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
      - $ref: '#/components/parameters/OptionId'
    patch:
      tags: [product]
      summary: option-02 옵션 수정
      description: |
        상품 생성자만 수정 가능합니다.
        - 해당 옵션의 order가 존재하면 수정 불가(단, 재고 수정은 가능)
        - 추가 금액 + 상품 금액 > 0
        - 재고 개수 >= 0
        - 수정하고 싶은 값만 전달(null 허용)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptionUpdateRequest'
      responses:
        '200':
          description: 수정된 옵션 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Option'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 생성자가 아니거나, order 존재로 재고 외 항목 수정 불가
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [product]
      summary: option-02 옵션 삭제
      description: |
        상품 생성자만 삭제 가능합니다.
        - 해당 옵션의 order가 존재하면 삭제 불가
      responses:
        '204':
          description: 삭제 완료 (본문 없음)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 생성자가 아니거나, order 존재로 삭제 불가
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'

  # ────────────────────────────── ORDER ──────────────────────────────
  /orders:
    post:
      tags: [order]
      summary: order-01 주문
      description: |
        사용자가 상품을 주문합니다. 주문 생성 / 쿠폰 사용 / 포인트 차감 / 재고 차감이 함께 처리됩니다.
        - 한 주문에 여러 상품(옵션) 주문 가능
        - 동일 옵션 id는 개수를 합산
        - 옵션은 필수
        - 주문 금액은 쿠폰 적용 이후 가격이며 > 0
        - 포인트 부족 시 취소, 재고 부족 시 취소
        - 실패한 경우 실패 사유를 반환
        - 주문 날짜는 date까지만 처리
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '201':
          description: 생성된 주문
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResult'
        '400':
          description: |
            주문 실패. 실패 사유를 message로 반환합니다.
            (예: 포인트 부족, 재고 부족, 주문 금액 <= 0, 잘못된 옵션/쿠폰 등)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      tags: [order]
      summary: order-02 구매자 주문 리스트 조회
      description: 로그인한 사용자가 주문한 모든 주문을 조회합니다. 정렬 없음.
      responses:
        '200':
          description: 내 주문 리스트
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BuyerOrder'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /orders/{orderId}:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    delete:
      tags: [order]
      summary: order-04 주문 취소
      description: |
        주문을 취소합니다.
        - 내가 주문한 주문만 취소 가능
        - 포인트 / 쿠폰 / 재고를 되돌리고 order를 삭제
        - 쿠폰은 사용 가능 상태로 복원
        - 주문 수정은 불가능(취소만 가능)
        - 남은 포인트를 반환
      responses:
        '200':
          description: 취소 완료, 남은 포인트 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 내 주문이 아님
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'

  /products/{productId}/orders:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [order]
      summary: order-03 판매자 주문 리스트 조회
      description: |
        상품 생성자(판매자)가 특정 상품의 주문 정보를 옵션별로 조회합니다.
        - 상품 생성자만 조회 가능
        - 구매자 정보는 email, name까지 조회
      responses:
        '200':
          description: 옵션별 주문 리스트
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SellerOptionOrders'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

# ────────────────────────────── COMPONENTS ─────────────────────────────
components:
  securitySchemes:
    UserIdCookie:
      type: apiKey
      in: cookie
      name: UserId
      description: 로그인 시 발급되는 `UserId=%d` 쿠키

  parameters:
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    OptionId:
      name: optionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: integer
        format: int64

  responses:
    BadRequest:
      description: 잘못된 요청(유효성 검증 실패)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: 인증 필요(로그인 쿠키 없음/유효하지 않음)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: 권한 없음(리소스 소유자 아님)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # ── Error ──
    Error:
      type: object
      properties:
        message:
          type: string
          description: 실패 사유
          example: 포인트가 부족합니다.
      required: [message]

    # ── User ──
    SignUpRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
          example: user@gmail.com
        password:
          type: string
          example: password
        name:
          type: string
          example: 홍길동

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@gmail.com
        password:
          type: string
          example: password

    UserInfo:
      type: object
      description: password는 포함하지 않음
      properties:
        name:
          type: string
          example: 홍길동
        point:
          type: integer
          format: int64
          example: 5000
      required: [name, point]

    ChargePointRequest:
      type: object
      required: [point]
      properties:
        point:
          type: integer
          format: int64
          minimum: 1
          description: 충전 포인트 (> 0)
          example: 10000

    # ── Coupon ──
    Coupon:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: 회원 가입 쿠폰
        discountAmount:
          type: integer
          format: int64
          description: 금액 할인(% 아님), > 0
          example: 1000
      required: [id, name, discountAmount]

    # ── Product ──
    Creator:
      type: object
      properties:
        name:
          type: string
          example: 홍길동
      required: [name]

    ProductCreateRequest:
      type: object
      required: [description, price]
      properties:
        description:
          type: string
          example: 편안한 러닝화
        price:
          type: integer
          format: int64
          minimum: 1
          description: 판매 금액 (> 0)
          example: 50000

    ProductUpdateRequest:
      type: object
      description: 수정할 값만 전달(null 허용). 이미 order가 있으면 price 수정 불가.
      properties:
        description:
          type: string
          nullable: true
          example: 편안한 러닝화 v2
        price:
          type: integer
          format: int64
          nullable: true
          minimum: 1
          description: 판매 금액 (> 0)
          example: 55000

    Product:
      type: object
      description: 상품 리스트/등록/수정 응답 (옵션 정보 미포함)
      properties:
        id:
          type: integer
          format: int64
          example: 1
        description:
          type: string
          example: 편안한 러닝화
        price:
          type: integer
          format: int64
          example: 50000
        creator:
          $ref: '#/components/schemas/Creator'
      required: [id, description, price, creator]

    MyProduct:
      type: object
      description: product-05 응답(생성자 정보 생략)
      properties:
        id:
          type: integer
          format: int64
          example: 1
        description:
          type: string
          example: 편안한 러닝화
        price:
          type: integer
          format: int64
          example: 50000
      required: [id, description, price]

    ProductDetail:
      type: object
      description: product-04 상세 응답 (옵션 리스트 포함)
      properties:
        id:
          type: integer
          format: int64
          example: 1
        description:
          type: string
          example: 편안한 러닝화
        price:
          type: integer
          format: int64
          example: 50000
        creator:
          $ref: '#/components/schemas/Creator'
        options:
          type: array
          items:
            $ref: '#/components/schemas/Option'
      required: [id, description, price, creator, options]

    # ── Option ──
    OptionCreateRequest:
      type: object
      required: [description, additionalPrice, stock]
      properties:
        description:
          type: string
          example: 270 사이즈
        additionalPrice:
          type: integer
          format: int64
          description: 옵션 추가 금액. (추가 금액 + 상품 금액) > 0
          example: 5000
        stock:
          type: integer
          format: int64
          minimum: 0
          description: 재고 개수 (>= 0)
          example: 100

    OptionUpdateRequest:
      type: object
      description: |
        수정할 값만 전달(null 허용).
        해당 옵션의 order가 존재하면 재고(stock) 외 항목은 수정 불가.
      properties:
        description:
          type: string
          nullable: true
          example: 270 사이즈(리뉴얼)
        additionalPrice:
          type: integer
          format: int64
          nullable: true
          description: (추가 금액 + 상품 금액) > 0
          example: 6000
        stock:
          type: integer
          format: int64
          nullable: true
          minimum: 0
          description: 재고 개수 (>= 0)
          example: 80

    Option:
      type: object
      description: |
        옵션 정보. 명세상 표기 필드는 { 설명, 추가 금액, 재고 }이나,
        주문(order-01)에서 옵션 id가 필요하므로 id를 포함합니다.
      properties:
        id:
          type: integer
          format: int64
          example: 10
        description:
          type: string
          example: 270 사이즈
        additionalPrice:
          type: integer
          format: int64
          example: 5000
        stock:
          type: integer
          format: int64
          example: 100
      required: [id, description, additionalPrice, stock]

    # ── Order ──
    OrderLineRequest:
      type: object
      required: [optionId, count]
      properties:
        optionId:
          type: integer
          format: int64
          example: 10
        count:
          type: integer
          format: int64
          minimum: 1
          example: 2

    OrderCreateRequest:
      type: object
      required: [productOrders]
      properties:
        productOrders:
          type: array
          description: 제품 주문 리스트. 동일 optionId는 개수를 합산.
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderLineRequest'
        couponId:
          type: integer
          format: int64
          nullable: true
          description: 사용할 쿠폰 id (선택)
          example: 1

    OrderLineResult:
      type: object
      properties:
        optionId:
          type: integer
          format: int64
          example: 10
        count:
          type: integer
          format: int64
          example: 2
      required: [optionId, count]

    OrderResult:
      type: object
      description: order-01 응답
      properties:
        id:
          type: integer
          format: int64
          example: 100
        productOrders:
          type: array
          items:
            $ref: '#/components/schemas/OrderLineResult'
        amount:
          type: integer
          format: int64
          description: 쿠폰 적용 이후 최종 주문 금액 (> 0)
          example: 99000
        orderDate:
          type: string
          format: date
          description: 주문 날짜(date까지만)
          example: '2026-07-14'
        orderer:
          $ref: '#/components/schemas/Creator'
      required: [id, productOrders, amount, orderDate, orderer]

    # ── Buyer order list (order-02) ──
    OrderLineDetail:
      type: object
      description: 상품/옵션 정보를 포함한 제품 주문 상세
      properties:
        product:
          $ref: '#/components/schemas/Product'
        option:
          $ref: '#/components/schemas/Option'
        count:
          type: integer
          format: int64
          example: 2
      required: [product, option, count]

    BuyerOrder:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 100
        productOrders:
          type: array
          items:
            $ref: '#/components/schemas/OrderLineDetail'
        amount:
          type: integer
          format: int64
          example: 99000
        orderDate:
          type: string
          format: date
          example: '2026-07-14'
      required: [id, productOrders, amount, orderDate]

    # ── Seller order list (order-03) ──
    Buyer:
      type: object
      properties:
        email:
          type: string
          format: email
          example: buyer@example.com
        name:
          type: string
          example: 김철수
      required: [email, name]

    SellerOrderEntry:
      type: object
      properties:
        buyer:
          $ref: '#/components/schemas/Buyer'
        count:
          type: integer
          format: int64
          example: 2
      required: [buyer, count]

    SellerOptionOrders:
      type: object
      description: 옵션 id 기준으로 묶인 구매자/개수 리스트
      properties:
        optionId:
          type: integer
          format: int64
          example: 10
        orders:
          type: array
          items:
            $ref: '#/components/schemas/SellerOrderEntry'
      required: [optionId, orders]

    # ── Cancel (order-04) ──
    CancelResult:
      type: object
      properties:
        point:
          type: integer
          format: int64
          description: 취소 후 남은 포인트
          example: 15000
      required: [point]
